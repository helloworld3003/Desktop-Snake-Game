name: Python application tests

# 1. When should this automated test run?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. What jobs should the robot perform?
jobs:
  build-and-test:
    # 3. What kind of virtual computer should it use?
    runs-on: windows-latest # We use Windows since your game is specifically for the Windows Desktop

    steps:
    # 4. First, download your game's code onto the virtual computer
    - name: Check out repository code
      uses: actions/checkout@v4

    # 5. Install Python on the virtual computer
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 6. Install the libraries your game needs (PyAutoGUI, PyQt5, etc.) and testing libraries (pytest)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    # 7. Check for bad code style or syntax errors using flake8
    - name: Lint code with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

     # 8. Finally, run your actual tests using pytest individually!
    - name: Test with pytest
      run: |
        pytest tests/test_logic.py
        pytest tests/test_scores.py
        pytest tests/test_grid.py
        pytest tests/test_keyboard.py
        pytest tests/test_icon_organizer.py
        pytest tests/test_resource_path.py
        pytest tests/test_overlay.py

